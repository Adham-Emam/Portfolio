{% extends 'layout.html' %} {% block styles %}
<style>
  footer {
    bottom: 50px;
  }
  body {
    min-height: 100vh;
  }
  header .logo img {
    filter: invert(0);
    transition-duration: 1s;
  }
  header.active-menu .logo img {
    filter: invert(1);
  }
  header .nav-menu a {
    filter: invert(0);
  }
  header.fixed ul a,
  header.fixed img {
    filter: invert(0.8);
  }
  header a {
    color: var(--background-color) !important;
  }
  header i,
  header span {
    filter: invert(0.8);
  }
  header a:hover {
    color: var(--main-color) !important;
  }
  .section-img .overlay {
    background-color: rgba(15, 0, 15, 0.6);
    width: 100%;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }
  .section-img {
    background-color: var(--text-color);
    background-image: url("https://res.cloudinary.com/drf4f1euk/image/upload/fl_preserve_transparency/v1716846316/projects_lebd5z.jpg?_s=public-apps");
    background-size: cover;
    background-position: center 40%;
    width: 100%;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }
  .projects > h2 {
    color: var(--background-color);
    font-size: 2.6rem;
    margin: 200px auto 250px;
    padding: 0 10px;
  }
  @media (max-width: 767px) {
    .container h2 {
      font-size: 1.5rem;
    }
  }
  .project-container {
    background-color: var(--background-color);
    min-height: 70vh;
  }
  .project-container .container {
    padding-bottom: 50px;
  }
  .project {
    display: flex;
    gap: 20px;
    margin: 20px 0;
    background-color: var(--section-color);
    box-shadow: 0 0 5px #333;
    transform: translateY(-50%);
  }
  .project:nth-child(even) {
    flex-direction: row-reverse;
  }

  .project .image {
    width: 40%;
    aspect-ratio: 16/9;
  }
  .project .image img {
    width: 100%;
    height: 100%;
  }
  .project .content {
    padding: 20px;
  }
  .project h2 {
    margin: 10px 0 15px;
    color: var(--main-color);
  }
  .project:nth-child(even) h2 {
    margin-left: auto;
  }
  .project:nth-child(even) .content {
    text-align: right !important;
  }
  .project a {
    color: var(--main-color);
    transition-duration: 0.3s;
    padding: 20px;
    margin-left: auto;
  }
  .project:nth-child(even) a {
    margin-left: 0;
    margin-right: auto;
  }
  .project a:hover {
    color: var(--second-color);
  }
  @media (max-width: 767px) {
    .project {
      transform: translateY(-25%);
      flex-direction: column !important;
      gap: 0;
    }
    .project .image {
      width: 100%;
    }
    .project .content {
      padding: 20px 20px 0;
      text-align: left !important;
    }
    .project .content span {
      display: block;
    }
    .project .content h2 {
      margin-left: 0;
    }
    .project .content * {
      text-align: left !important;
    }
    .project a {
      margin-right: 0 !important;
      margin-left: auto !important;
    }
  }
</style>
{% endblock %} {% block content %}

<div class="section-img">
  <div class="overlay"></div>
</div>
<div class="projects">
  <h2>Where Ideas Come to Life</h2>
  <div class="project-container">
    <div class="container">
      {% for project in projects %}
      <div class="project">
        <div class="image">
          {% if project.img_url %}
          <img src="{{project.img_url}}" alt="Project Image" />
          {% else %}
          <img src="{{ url_for('static', filename='images/blank.jpg') }}" />
          {% endif %}
        </div>
        <div class="content">
          <span>{{ project.date_posted }}</span>
          <h2>{{ project.title }}</h2>
          <p>{{ project.description }}</p>
        </div>
        <a href="{{ project.project_url }}"><i class="fa-solid fa-link"></i></a>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
